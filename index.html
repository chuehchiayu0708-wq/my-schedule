<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的計劃表</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 定義亮色與深色模式的顏色變數 */
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f3f4f6;
            --surface: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --danger: #ef4444;
            --border: #e5e7eb;
            --input-bg: #ffffff;
            --header-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        [data-theme="dark"] {
            --primary: #6366f1;
            --primary-hover: #818cf8;
            --bg: #111827;
            --surface: #1f2937;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --danger: #f87171;
            --border: #374151;
            --input-bg: #374151;
            --header-gradient: linear-gradient(135deg, #312e81 0%, #1e1b4b 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        .app-container {
            background-color: var(--surface);
            width: 100%;
            max-width: 480px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: background-color 0.3s;
            position: relative;
        }

        .header {
            background: var(--header-gradient);
            color: white;
            padding: 30px 20px 20px 20px;
            text-align: center;
            position: relative;
            transition: background 0.3s;
        }

        /* 雲端連線狀態指示 */
        .sync-status {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.2);
            padding: 5px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sync-status i { color: #facc15; } /* 預設黃色載入中 */
        .sync-status.connected i { color: #4ade80; } /* 綠色已連線 */

        /* 深色模式切換按鈕 */
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.2s;
        }

        .theme-toggle:hover {
            background: rgba(255,255,255,0.3);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
            margin-top: 15px;
        }

        /* 日期選擇器下拉選單樣式 */
        .date-selectors {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            color: white;
            font-size: 16px;
        }

        .date-select {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
        }
        
        .date-select:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .date-select option {
            background-color: var(--surface);
            color: var(--text-main);
        }

        .input-section {
            padding: 20px;
            background-color: var(--surface);
            border-bottom: 1px solid var(--border);
            transition: background-color 0.3s, border-color 0.3s;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            padding: 12px 15px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            background-color: var(--input-bg);
            color: var(--text-main);
            transition: border-color 0.2s, background-color 0.3s, color 0.3s;
        }

        input:focus {
            border-color: var(--primary);
        }

        /* 時間選擇器下拉選單樣式 */
        .time-selectors {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .time-select {
            padding: 12px 5px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            background-color: var(--input-bg);
            color: var(--text-main);
            transition: border-color 0.2s, background-color 0.3s, color 0.3s;
            cursor: pointer;
        }

        .time-select:focus {
            border-color: var(--primary);
        }

        input[type="text"] {
            flex-grow: 1;
        }

        button.add-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0 20px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s, transform 0.1s;
        }

        button.add-btn:hover {
            background-color: var(--primary-hover);
        }

        button.add-btn:active {
            transform: scale(0.95);
        }

        .error-msg {
            color: var(--danger);
            font-size: 12px;
            margin-top: 8px;
            display: none;
        }

        .schedule-section {
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .timeline {
            list-style: none;
            position: relative;
        }

        .timeline::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 20px;
            width: 2px;
            background-color: var(--border);
            transition: background-color 0.3s;
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 20px;
            position: relative;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .task-dot {
            width: 14px;
            height: 14px;
            background-color: var(--primary);
            border-radius: 50%;
            border: 3px solid var(--surface);
            box-shadow: 0 0 0 1px var(--primary);
            position: absolute;
            left: 14px;
            top: 5px;
            z-index: 1;
            transition: border-color 0.3s;
        }

        .task-content {
            margin-left: 45px;
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            transition: background-color 0.3s, border-color 0.3s;
        }

        .task-info {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            padding-right: 15px;
        }

        .task-time {
            font-size: 13px;
            color: var(--primary);
            margin-bottom: 4px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.3s;
        }

        .task-title {
            font-size: 15px;
            font-weight: 500;
            word-break: break-all;
        }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s;
            opacity: 0.6;
        }

        .action-btn:hover {
            background-color: var(--bg);
            opacity: 1;
        }

        .check-btn:hover { color: #10b981; }
        .edit-btn:hover { color: var(--primary); }
        .delete-btn:hover { color: var(--danger); }

        .task-completed .task-title {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .task-completed .task-dot {
            background-color: #10b981;
            box-shadow: 0 0 0 1px #10b981;
        }

        .task-completed .check-btn {
            color: #10b981;
            opacity: 1;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 30px 0;
            font-size: 14px;
            transition: color 0.3s;
        }

        /* 隱藏卷軸 */
        .schedule-section::-webkit-scrollbar { width: 6px; }
        .schedule-section::-webkit-scrollbar-thumb { background-color: var(--border); border-radius: 10px; }

        /* =========================================
           全螢幕通知 Modal 樣式
           ========================================= */
        .notification-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: none; /* 預設隱藏，觸發時改為 flex */
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s;
        }

        .notification-card {
            background-color: var(--surface);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            width: 90%;
            max-width: 360px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: popUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .notif-icon {
            font-size: 70px;
            color: var(--primary);
            margin-bottom: 20px;
            animation: ring 1.5s infinite;
            transform-origin: top center;
        }

        .notif-time {
            font-size: 20px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 10px;
        }

        .notif-title {
            font-size: 24px;
            color: var(--text-main);
            font-weight: bold;
            margin-bottom: 30px;
            word-break: break-all;
        }

        .notif-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .notif-btn:hover {
            background-color: var(--primary-hover);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes popUp {
            from { opacity: 0; transform: scale(0.8) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes ring {
            0% { transform: rotate(0); }
            10% { transform: rotate(15deg); }
            20% { transform: rotate(-10deg); }
            30% { transform: rotate(5deg); }
            40% { transform: rotate(-5deg); }
            50% { transform: rotate(0); }
            100% { transform: rotate(0); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <!-- 雲端連線狀態 -->
        <div id="syncStatus" class="sync-status">
            <i class="fa-solid fa-cloud"></i> 載入中...
        </div>

        <!-- 深色模式切換按鈕 -->
        <button class="theme-toggle" id="themeToggleBtn" onclick="toggleTheme()" title="切換深色模式">
            <i class="fa-solid fa-moon"></i>
        </button>
        <h1 id="headerTitle"><i class="fa-solid fa-calendar-days"></i> 行程管理</h1>
        
        <!-- 下拉式日期選擇器 -->
        <div class="date-selectors">
            <select id="yearSelect" class="date-select" onchange="handleYearMonthChange()"></select> 年
            <select id="monthSelect" class="date-select" onchange="handleYearMonthChange()"></select> 月
            <select id="daySelect" class="date-select" onchange="changeDate()"></select> 日
        </div>
    </div>

    <div class="input-section">
        <div class="input-group">
            <!-- 下拉式 24小時制 時間選擇器 -->
            <div class="time-selectors">
                <select id="hourSelect" class="time-select"></select>
                <span>:</span>
                <select id="minuteSelect" class="time-select"></select>
            </div>
            <input type="text" id="taskInput" placeholder="準備做什麼呢？" required onkeypress="handleKeyPress(event)">
            <button class="add-btn" onclick="addTask()"><i class="fa-solid fa-plus"></i></button>
        </div>
        <div id="errorMsg" class="error-msg"><i class="fa-solid fa-circle-exclamation"></i> 請填寫完整的時間與行程內容！</div>
    </div>

    <div class="schedule-section">
        <ul class="timeline" id="scheduleList">
            <!-- 行程會動態載入這裡 -->
        </ul>
    </div>
</div>

<!-- =========================================
     全螢幕通知覆蓋層 (預設隱藏)
     ========================================= -->
<div class="notification-overlay" id="notificationOverlay">
    <div class="notification-card">
        <i class="fa-regular fa-bell notif-icon"></i>
        <div class="notif-time" id="notifTime">14:30</div>
        <div class="notif-title" id="notifTitle">這是一個測試行程</div>
        <button class="notif-btn" onclick="closeNotification()">我知道了！</button>
    </div>
</div>

<!-- =========================================
     Firebase 與 應用程式邏輯模組
     ========================================= -->
<script type="module">
    // 引入 Firebase 雲端資料庫 SDK
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // 全域變數
    let allTasks = {};
    let currentDate = '';
    let db, auth, userId, appId;
    let isCloudSyncActive = false;

    // ==========================================
    // 1. 初始化環境與 Firebase 連線
    // ==========================================
    async function initFirebase() {
        const syncStatusEl = document.getElementById('syncStatus');
        
        try {
            // 使用你專屬的 Firebase 密鑰
            const firebaseConfig = {
                apiKey: "AIzaSyDT_IND0lDbZiI0GI2i5AslTszNjXcDNKs",
                authDomain: "my-shcedule.firebaseapp.com",
                projectId: "my-shcedule",
                storageBucket: "my-shcedule.firebasestorage.app",
                messagingSenderId: "299079790493",
                appId: "1:299079790493:web:0f136c2486f5c159138974"
            };
            
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            
            // 設定專屬的應用程式 ID
            appId = "my-shcedule";

            // 進行匿名登入 (確保能正確寫入資料庫)
            await signInAnonymously(auth);

            // 監聽登入狀態並開啟資料庫連線
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    userId = user.uid;
                    isCloudSyncActive = true;
                    syncStatusEl.innerHTML = '<i class="fa-solid fa-cloud"></i> 雲端已同步';
                    syncStatusEl.classList.add('connected');
                    listenToCloudTasks(); // 啟動雲端即時監聽
                }
            });
        } catch (error) {
            // 如果連線失敗，降級回單機模式
            console.error("Firebase 連線發生錯誤:", error);
            isCloudSyncActive = false;
            syncStatusEl.innerHTML = '<i class="fa-solid fa-laptop"></i> 單機模式';
            syncStatusEl.classList.remove('connected');
            loadLocalData();
            renderTasks();
        }
    }

    // ==========================================
    // 2. 雲端資料同步邏輯
    // ==========================================
    function listenToCloudTasks() {
        if (!userId) return;
        
        // 嚴格遵守安全性規則路徑：/artifacts/{appId}/users/{userId}/tasks
        const tasksRef = collection(db, 'artifacts', appId, 'users', userId, 'tasks');
        
        onSnapshot(tasksRef, (snapshot) => {
            allTasks = {}; // 清空並重新從雲端組合
            
            snapshot.forEach(docSnap => {
                const task = docSnap.data();
                // 用日期分類存進記憶體
                if (!allTasks[task.date]) {
                    allTasks[task.date] = [];
                }
                allTasks[task.date].push(task);
            });

            // 為每一天的行程依照時間排序
            Object.keys(allTasks).forEach(date => {
                allTasks[date].sort((a, b) => a.time.localeCompare(b.time));
            });

            renderTasks();
        }, (error) => {
            console.error("雲端同步發生錯誤:", error);
        });
    }

    // 儲存/更新單一行程到雲端 (或單機)
    async function saveTask(task) {
        if (isCloudSyncActive) {
            // 存入 Firebase
            const docRef = doc(db, 'artifacts', appId, 'users', userId, 'tasks', task.id.toString());
            await setDoc(docRef, task);
        } else {
            // 存入 LocalStorage (單機模式)
            if (!allTasks[task.date]) allTasks[task.date] = [];
            
            // 檢查是否已存在 (編輯或更新狀態)
            const index = allTasks[task.date].findIndex(t => t.id === task.id);
            if(index !== -1) {
                allTasks[task.date][index] = task;
            } else {
                allTasks[task.date].push(task);
            }
            allTasks[task.date].sort((a, b) => a.time.localeCompare(b.time));
            localStorage.setItem('myScheduleAllTasks', JSON.stringify(allTasks));
            renderTasks();
        }
    }

    // 刪除單一行程
    async function removeTask(task) {
        if (isCloudSyncActive) {
            const docRef = doc(db, 'artifacts', appId, 'users', userId, 'tasks', task.id.toString());
            await deleteDoc(docRef);
        } else {
            if (allTasks[task.date]) {
                allTasks[task.date] = allTasks[task.date].filter(t => t.id !== task.id);
                if (allTasks[task.date].length === 0) delete allTasks[task.date];
                localStorage.setItem('myScheduleAllTasks', JSON.stringify(allTasks));
                renderTasks();
            }
        }
    }

    function loadLocalData() {
        const saved = localStorage.getItem('myScheduleAllTasks');
        if (saved) allTasks = JSON.parse(saved);
    }

    // ==========================================
    // 3. UI 與功能邏輯
    // ==========================================
    function initTheme() {
        const savedTheme = localStorage.getItem('myScheduleTheme');
        const html = document.documentElement;
        const toggleIcon = document.querySelector('#themeToggleBtn i');
        
        if (savedTheme === 'dark') {
            html.setAttribute('data-theme', 'dark');
            toggleIcon.className = 'fa-solid fa-sun';
        } else {
            html.setAttribute('data-theme', 'light');
            toggleIcon.className = 'fa-solid fa-moon';
        }
    }

    window.toggleTheme = function() {
        const html = document.documentElement;
        const toggleIcon = document.querySelector('#themeToggleBtn i');
        if (html.getAttribute('data-theme') === 'light') {
            html.setAttribute('data-theme', 'dark');
            localStorage.setItem('myScheduleTheme', 'dark');
            toggleIcon.className = 'fa-solid fa-sun';
        } else {
            html.setAttribute('data-theme', 'light');
            localStorage.setItem('myScheduleTheme', 'light');
            toggleIcon.className = 'fa-solid fa-moon';
        }
    }

    function initSelectors() {
        const hourSelect = document.getElementById('hourSelect');
        for(let i = 0; i < 24; i++) {
            const val = i.toString().padStart(2, '0');
            hourSelect.add(new Option(val, val));
        }

        const minuteSelect = document.getElementById('minuteSelect');
        for(let i = 0; i < 60; i += 5) { // 為了方便，分鐘間隔設為 5
            const val = i.toString().padStart(2, '0');
            minuteSelect.add(new Option(val, val));
        }

        const yearSelect = document.getElementById('yearSelect');
        const currentYear = new Date().getFullYear();
        for(let i = currentYear - 1; i <= currentYear + 3; i++) {
            yearSelect.add(new Option(i, i));
        }

        const monthSelect = document.getElementById('monthSelect');
        for(let i = 1; i <= 12; i++) {
            const val = i.toString().padStart(2, '0');
            monthSelect.add(new Option(val, val));
        }
    }

    function updateDays() {
        const year = parseInt(document.getElementById('yearSelect').value);
        const month = parseInt(document.getElementById('monthSelect').value);
        const daySelect = document.getElementById('daySelect');
        const currentSelectedDay = daySelect.value;
        
        daySelect.innerHTML = ''; 
        const daysInMonth = new Date(year, month, 0).getDate(); 
        
        for(let i = 1; i <= daysInMonth; i++) {
            const val = i.toString().padStart(2, '0');
            daySelect.add(new Option(val, val));
        }

        if(currentSelectedDay && parseInt(currentSelectedDay) <= daysInMonth) {
            daySelect.value = currentSelectedDay;
        }
    }

    function initDate() {
        const today = new Date();
        document.getElementById('yearSelect').value = today.getFullYear();
        document.getElementById('monthSelect').value = String(today.getMonth() + 1).padStart(2, '0');
        updateDays(); 
        document.getElementById('daySelect').value = String(today.getDate()).padStart(2, '0');
        updateCurrentDateStr();
    }

    function updateCurrentDateStr() {
        const yyyy = document.getElementById('yearSelect').value;
        const mm = document.getElementById('monthSelect').value;
        const dd = document.getElementById('daySelect').value;
        currentDate = `${yyyy}-${mm}-${dd}`;
    }

    window.handleYearMonthChange = function() {
        updateDays();
        window.changeDate();
    }

    window.changeDate = function() {
        updateCurrentDateStr();
        renderTasks();
    }

    window.handleKeyPress = function(event) {
        if (event.key === 'Enter') window.addTask();
    }

    window.addTask = function() {
        const hour = document.getElementById('hourSelect').value;
        const minute = document.getElementById('minuteSelect').value;
        const taskInput = document.getElementById('taskInput');
        const errorMsg = document.getElementById('errorMsg');
        const taskValue = taskInput.value.trim();

        if (!taskValue) {
            errorMsg.style.display = 'block';
            return;
        }
        errorMsg.style.display = 'none';

        const newTask = {
            id: Date.now(),
            date: currentDate, // 加上日期欄位，方便雲端分辨
            time: `${hour}:${minute}`,
            title: taskValue,
            isCompleted: false,
            isNotified: false // 判斷是否已經通知過
        };

        saveTask(newTask);

        taskInput.value = '';
        taskInput.focus();
    }

    window.editTask = function(id) {
        const taskList = allTasks[currentDate] || [];
        const task = taskList.find(t => t.id === id);
        if (!task) return;

        const newTitle = prompt('✏️ 修改行程內容：', task.title);
        if (newTitle !== null && newTitle.trim() !== '') {
            task.title = newTitle.trim();
            saveTask(task);
        }
    }

    window.toggleComplete = function(id) {
        const taskList = allTasks[currentDate] || [];
        const task = taskList.find(t => t.id === id);
        if (task) {
            task.isCompleted = !task.isCompleted;
            saveTask(task);
        }
    }

    window.deleteTask = function(id) {
        const taskList = allTasks[currentDate] || [];
        const task = taskList.find(t => t.id === id);
        if (task && confirm('確定要刪除這個行程嗎？')) {
            removeTask(task);
        }
    }

    function renderTasks() {
        const list = document.getElementById('scheduleList');
        list.innerHTML = ''; 
        
        const tasksToRender = allTasks[currentDate] || [];

        if (tasksToRender.length === 0) {
            list.innerHTML = `
                <div class="empty-state">
                    <i class="fa-regular fa-calendar-xmark" style="font-size: 32px; margin-bottom: 12px; display: block; opacity: 0.5;"></i>
                    這天還沒有行程，趕快新增一個吧！
                </div>`;
            return;
        }

        tasksToRender.forEach(task => {
            const li = document.createElement('li');
            li.className = `task-item ${task.isCompleted ? 'task-completed' : ''}`;
            li.innerHTML = `
                <div class="task-dot"></div>
                <div class="task-content">
                    <div class="task-info">
                        <span class="task-time"><i class="fa-regular fa-clock"></i> ${task.time}</span>
                        <span class="task-title">${task.title}</span>
                    </div>
                    <div class="task-actions">
                        <button class="action-btn check-btn" onclick="toggleComplete(${task.id})" title="完成">
                            <i class="fa-solid fa-check"></i>
                        </button>
                        <button class="action-btn edit-btn" onclick="editTask(${task.id})" title="編輯">
                            <i class="fa-solid fa-pen-to-square"></i>
                        </button>
                        <button class="action-btn delete-btn" onclick="deleteTask(${task.id})" title="刪除">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                </div>
            `;
            list.appendChild(li);
        });
    }

    // ==========================================
    // 4. 全螢幕通知計時器核心
    // ==========================================
    function checkNotifications() {
        const now = new Date();
        const yyyy = now.getFullYear();
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const dd = String(now.getDate()).padStart(2, '0');
        const todayStr = `${yyyy}-${mm}-${dd}`;
        
        const currentHH = String(now.getHours()).padStart(2, '0');
        const currentMM = String(now.getMinutes()).padStart(2, '0');
        const currentTimeStr = `${currentHH}:${currentMM}`;

        // 檢查今天是否有行程
        if (allTasks[todayStr]) {
            allTasks[todayStr].forEach(task => {
                // 條件：時間吻合 + 還沒完成 + 還沒通知過
                if (task.time === currentTimeStr && !task.isCompleted && !task.isNotified) {
                    triggerNotification(task);
                }
            });
        }
    }

    function triggerNotification(task) {
        // 立刻標記為已通知，並存回資料庫，避免在其他裝置重複彈出
        task.isNotified = true;
        saveTask(task);

        // 顯示全螢幕 UI
        const overlay = document.getElementById('notificationOverlay');
        document.getElementById('notifTime').innerText = task.time;
        document.getElementById('notifTitle').innerText = task.title;
        overlay.style.display = 'flex';
    }

    window.closeNotification = function() {
        document.getElementById('notificationOverlay').style.display = 'none';
    }

    // 每 10 秒檢查一次時間
    setInterval(checkNotifications, 10000);

    // ==========================================
    // 5. 啟動應用程式
    // ==========================================
    window.onload = function() {
        initTheme();
        initSelectors();
        initDate();
        initFirebase(); // 開始連接資料庫
    }
</script>

</body>
</html>
